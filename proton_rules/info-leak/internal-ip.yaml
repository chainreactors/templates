id: spray-internal-ip
info:
  name: Internal IP Address
  severity: medium
  description: Detect internal/private IP address disclosure in web content
  tags: spray, pentest, inter-ip

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "127.0.0.1"
          - "10."
          - "192.168"
        condition: or
    extractors:
      - type: regex
        name: inter-ip
        group: 1
        regex:
          - '[^0-9]((127\.0\.0\.1)|(10\.\d{1,3}\.\d{1,3}\.\d{1,3})|(172\.((1[6-9])|(2\d)|(3[01]))\.\d{1,3}\.\d{1,3})|(192\.168\.\d{1,3}\.\d{1,3}))'
