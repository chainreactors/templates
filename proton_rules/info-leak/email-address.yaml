id: spray-email-address
info:
  name: Email Address
  severity: info
  description: Extract email addresses from web content
  tags: spray, info, mail

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: mail
        regex:
          - '([A-Za-z0-9_.+-]+@[A-Za-z][A-Za-z0-9.-]+\.[A-Za-z]{2,8})'
