id: spray-rsa-private-key
info:
  name: RSA Private Key
  severity: critical
  description: Detect RSA or other private key blocks in web content
  tags: spray, pentest, credential, rsa-key

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "BEGIN"
          - "PRIVATE KEY"
        condition: and
    extractors:
      - type: regex
        name: rsa-key
        regex:
          - '[-]+BEGIN [^\s]+ PRIVATE KEY[-]+'
