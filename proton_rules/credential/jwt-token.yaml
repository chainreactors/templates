id: spray-jwt-token
info:
  name: JWT Token
  severity: medium
  description: Detect JSON Web Tokens in web content
  tags: spray, pentest, credential, jwt

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "eyJ"
        condition: or
    extractors:
      - type: regex
        name: jwt
        regex:
          - 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9._-]{10,}'
          - 'eyJ[A-Za-z0-9_/+-]{10,}\.[A-Za-z0-9._/+-]{10,}'
