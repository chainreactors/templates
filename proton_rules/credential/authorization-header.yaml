id: spray-auth-header
info:
  name: Authorization Header
  severity: high
  description: Extract Bearer and Basic authentication tokens from headers
  tags: spray, pentest, auth-header

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "Authorization:"
          - "Bearer "
          - "Basic "
        condition: or
    extractors:
      - type: regex
        name: auth-header
        regex:
          - 'Authorization:\s*(Bearer\s+[A-Za-z0-9\-._~+/]+=*)'
          - 'Authorization:\s*(Basic\s+[A-Za-z0-9+/]+=*)'
