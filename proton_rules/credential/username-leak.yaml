id: spray-username-leak
info:
  name: Username Leak
  severity: low
  description: Detect hardcoded usernames in web content
  tags: spray, info, credential, username

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "user"
          - "name"
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: username
        regex:
          - "(?i)(user|name|username)[\\s=\"':]+[A-Za-z0-9!@%.]{3,20}[\\s\"']"
