id: spray-username-leak
info:
  name: Username Leak
  severity: low
  description: Detect hardcoded usernames in web content
  tags: spray, info, credential, username

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "username"
          - "user_name"
          - "userName"
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: username
        regex:
          - '(?i)(?:username|user_name|userName)\s*[:=]\s*["\x27]([A-Za-z0-9!@%.]{3,30})["\x27]'
