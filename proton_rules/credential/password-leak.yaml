id: spray-password-leak
info:
  name: Password Leak
  severity: high
  description: Detect hardcoded passwords in web content
  tags: spray, pentest, credential, password

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "pass"
          - "pwd"
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: password
        regex:
          - "(?i)(pass|pwd|passwd|password)[\\s=\"':]+[A-Za-z0-9!@#$%^?.*&]{3,20}[\"']"
