id: spray-github-token
info:
  name: GitHub Token
  severity: high
  description: Detect GitHub authentication tokens in web content
  tags: spray, pentest, credential, github-token

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "github.com"
    extractors:
      - type: regex
        name: github-token
        regex:
          - "[a-z0-9_-]*:[a-z0-9_-]+@github\\.com[^\\s\"']*"
