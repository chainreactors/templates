id: spray-generic-api-key
info:
  name: Generic API Key
  severity: medium
  description: Detect generic API key and secret patterns in web content
  tags: spray, pentest, token, api-key

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "api_key"
          - "apikey"
          - "api-key"
          - "secret_key"
          - "access_token"
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: api-key
        regex:
          - "(?i)(api[_-]?key|apikey|api[_-]?secret|api[_-]?token)\\s*[:=]\\s*[\"']?([A-Za-z0-9_-]{16,64})[\"']?"
          - "(?i)(secret[_-]?key|client[_-]?secret|app[_-]?secret)\\s*[:=]\\s*[\"']?([A-Za-z0-9_-]{16,64})[\"']?"
          - "(?i)(access[_-]?token|auth[_-]?token)\\s*[:=]\\s*[\"']?([A-Za-z0-9_.-]{16,})[\"']?"
