id: ssh-credential-files
service: [ssh]
chain: [ssh-credential-files-linux, ssh-credential-files-windows]
info:
  name: SSH Credential File Discovery (OS Dispatch)
  severity: high
  tags: ssh,post-exploit,credential

services:
  - ops:
      - shell: "uname -s 2>/dev/null || echo WINDOWS"
        name: os_detect
    extractors:
      - type: regex
        name: os_type
        internal: true
        part: os_detect
        regex: ['(Linux|Darwin|FreeBSD|WINDOWS)']
        group: 1
