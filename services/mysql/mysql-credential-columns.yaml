id: mysql-credential-columns
service: [mysql]
info:
  name: MySQL Credential Column Discovery
  severity: high
  tags: mysql,post-exploit,credential

services:
  - ops:
      - db: >
          SELECT TABLE_SCHEMA, TABLE_NAME, COLUMN_NAME
          FROM INFORMATION_SCHEMA.COLUMNS
          WHERE (LOWER(COLUMN_NAME) LIKE '%password%'
             OR LOWER(COLUMN_NAME) LIKE '%passwd%'
             OR LOWER(COLUMN_NAME) LIKE '%secret%'
             OR LOWER(COLUMN_NAME) LIKE '%token%'
             OR LOWER(COLUMN_NAME) LIKE '%api_key%')
          AND TABLE_SCHEMA NOT IN ('information_schema','mysql','performance_schema','sys')
        name: cred_columns
    matchers:
      - type: dsl
        dsl: ["len(cred_columns) > 0"]
    extractors:
      - type: regex
        name: found_columns
        part: cred_columns
        regex: ['(\S+)\t(\S+)\t(\S+)']
