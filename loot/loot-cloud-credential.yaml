id: loot-cloud-credential
info:
  name: Cloud Access Credential
  severity: high
  tags: loot,credential,cloud
file:
  - extensions:
      - all
    extractors:
      - type: regex
        regex:
          - '(?:AKIA|ASIA)[A-Z0-9]{16}'
          - 'LTAI[A-Za-z0-9]{12,20}'
          - 'AKID[A-Za-z0-9]{13,20}'
          - '(?i)(?:access_?key|secret_?key|ak|sk)\s*[=:]\s*["\x27]?([A-Za-z0-9/+=]{16,})["\x27]?'
