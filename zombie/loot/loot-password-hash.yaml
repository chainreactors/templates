id: loot-password-hash
info:
  name: Password Hash
  severity: high
  tags: loot,credential,hash
file:
  - extensions:
      - all
    extractors:
      - type: regex
        regex:
          - '\$(?:1|2[aby]?|5|6|argon2[id]?|scrypt|pbkdf2-sha(?:256|512))\$[^\s:]{8,}'
          - '\b[a-fA-F0-9]{32}\b'
          - '\b[a-fA-F0-9]{40}\b'
          - '\b[a-fA-F0-9]{64}\b'
