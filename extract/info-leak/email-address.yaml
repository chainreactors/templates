id: spray-email-address
info:
  name: Email Address
  severity: info
  description: Extract email addresses from web content
  tags: spray, info

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: mail
        regex:
          - '[A-Za-z0-9\p{Han}_.]+@[A-Za-z0-9_.-]+\.[A-Za-z]{2,8}'
