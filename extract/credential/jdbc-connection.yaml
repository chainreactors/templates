id: spray-jdbc-connection
info:
  name: JDBC Connection String
  severity: high
  description: Detect JDBC database connection strings in web content
  tags: spray, pentest, credential

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "jdbc:"
    extractors:
      - type: regex
        name: jdbc
        regex:
          - 'jdbc:[a-z0-9a-z]+://[a-z0-9.\-_:;=/@?,&]+'
