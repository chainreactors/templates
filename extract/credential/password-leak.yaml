id: spray-password-leak
info:
  name: Password Leak
  severity: high
  description: Detect hardcoded passwords in web content
  tags: spray, pentest, credential

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: password
        regex:
          - "(?i)(pass|pwd|passwd|password)[\\s=\"':]+[A-Za-z0-9!@#$%^?.*&]{3,20}[\"']"
