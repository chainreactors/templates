id: spray-database-connection
info:
  name: Database Connection String
  severity: high
  description: Detect database connection strings (MongoDB, Redis, MySQL, PostgreSQL) in web content
  tags: spray, pentest, credential

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "mongodb://"
          - "mongodb+srv://"
          - "redis://"
          - "mysql://"
        condition: or
    extractors:
      - type: regex
        name: db-connection
        regex:
          - "mongodb(\\+srv)?://[^\\s\"'<>]{10,}"
          - "redis://[^\\s\"'<>]{5,}"
          - "mysql://[^\\s\"'<>]{10,}"
          - "postgres(ql)?://[^\\s\"'<>]{10,}"
          - "mssql://[^\\s\"'<>]{10,}"
