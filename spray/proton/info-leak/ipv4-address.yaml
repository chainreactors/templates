id: spray-ipv4-address
info:
  name: IPv4 Address
  severity: info
  description: Extract IPv4 addresses from web content
  tags: spray, info, pentest, ip

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: ip
        group: 1
        regex:
          - '[^\d.]((?:(?:25[0-5]|2[0-4]\d|[01]?\d{1,2})\.){3}(?:25[0-5]|2[0-4]\d|[01]?\d{1,2}))[^\d]'
