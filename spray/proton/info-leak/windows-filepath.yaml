id: spray-windows-filepath
info:
  name: Windows File Path
  severity: low
  description: Detect Windows file path disclosure in web content
  tags: spray, pentest, windows-file

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: windows-file
        group: 1
        regex:
          - '[^\w](([a-zA-Z]:\\(?:\w+\\?)*)|([a-zA-Z]:\\(?:\w+\\)*\w+\.\w+))'
