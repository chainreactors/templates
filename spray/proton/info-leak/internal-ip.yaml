id: spray-internal-ip
info:
  name: Internal IP Address
  severity: medium
  description: Detect internal/private IP address disclosure in web content
  tags: spray, pentest, inter-ip

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "127.0.0.1"
          - "10."
          - "192.168"
        condition: or
    extractors:
      - type: regex
        name: inter-ip
        group: 1
        regex:
          - '[^\d.]((127\.0\.0\.1)|(10\.(?:25[0-5]|2[0-4]\d|[01]?\d{1,2})\.(?:25[0-5]|2[0-4]\d|[01]?\d{1,2})\.(?:25[0-5]|2[0-4]\d|[01]?\d{1,2}))|(172\.(?:1[6-9]|2\d|3[01])\.(?:25[0-5]|2[0-4]\d|[01]?\d{1,2})\.(?:25[0-5]|2[0-4]\d|[01]?\d{1,2}))|(192\.168\.(?:25[0-5]|2[0-4]\d|[01]?\d{1,2})\.(?:25[0-5]|2[0-4]\d|[01]?\d{1,2})))[^\d]'
