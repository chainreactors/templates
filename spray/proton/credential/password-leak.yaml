id: spray-password-leak
info:
  name: Password Leak
  severity: high
  description: Detect hardcoded passwords in web content
  tags: spray, pentest, credential, password

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "password"
          - "passwd"
          - "pwd="
          - "pwd:"
        condition: or
        case-insensitive: true
    extractors:
      - type: regex
        name: password
        regex:
          - '(?i)(?:password|passwd|pwd)\s*[:=]\s*["\x27]([A-Za-z0-9!@#$%^?.*&]{3,50})["\x27]'
