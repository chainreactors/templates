id: spray-tencent-cloud-key
info:
  name: Tencent Cloud Key
  severity: critical
  description: Detect Tencent Cloud SecretId and SecretKey in web content
  tags: spray, pentest, cloud, tencent-cloud

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "AKID"
          - "SecretId"
          - "SecretKey"
        condition: or
    extractors:
      - type: regex
        name: tencent-cloud
        regex:
          - "AKID[A-Za-z0-9]{13,20}"
          - "(?i)secret[_-]?id\\s*[:=]\\s*[\"']?(AKID[A-Za-z0-9]+)[\"']?"
          - "(?i)secret[_-]?key\\s*[:=]\\s*[\"']?([A-Za-z0-9]{32,})[\"']?"
