id: spray-vault-token
info:
  name: HashiCorp Vault Token
  severity: critical
  description: Detect HashiCorp Vault tokens in web content
  tags: spray, pentest, credential

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: vault-token
        regex:
          - "hvs\\.[a-zA-Z0-9_-]{24,}"
          - "hvb\\.[a-zA-Z0-9_-]{24,}"
          - "hvr\\.[a-zA-Z0-9_-]{24,}"
          - "(?i)vault[_-]?token\\s*[:=]\\s*[\"']?([a-zA-Z0-9._-]+)[\"']?"
