id: spray-private-key-generic
info:
  name: Generic Private Key
  severity: critical
  description: Detect various private key types (EC, DSA, PGP, SSH, PKCS8) in web content
  tags: spray, pentest, credential

file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "BEGIN"
          - "KEY"
        condition: and
    extractors:
      - type: regex
        name: private-key
        regex:
          - '-----BEGIN (RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY( BLOCK)?-----'
          - '-----BEGIN (ENCRYPTED )?PRIVATE KEY-----'
