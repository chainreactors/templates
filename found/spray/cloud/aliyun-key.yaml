id: spray-aliyun-key
info:
  name: Aliyun AccessKey
  severity: critical
  description: Detect Alibaba Cloud AccessKey ID and Secret in web content
  tags: spray, pentest, cloud

file:
  - extensions:
      - all
    extractors:
      - type: regex
        name: aliyun-ak
        regex:
          - "LTAI[A-Za-z0-9]{12,20}"
          - "(?i)alibaba[_-]?cloud[_-]?(access[_-]?key|secret)\\s*[:=]\\s*[\"']?([A-Za-z0-9]+)[\"']?"
