id: auto-windows
info:
  name: Windows Sensitive Directories
  os: windows

paths:
  # 当前用户所有 dotfiles（.ssh, .aws, .kube, .docker, ...）
  - path: "%USERPROFILE%\\.*"
    tags: [dotfiles, user]
  - path: "%USERPROFILE%\\.docker"
    tags: [docker, config]
  - path: "%USERPROFILE%\\.gitconfig"
    tags: [git, config]
  - path: "%USERPROFILE%\\.git-credentials"
    tags: [git, credential]
  - path: "%USERPROFILE%\\.ssh"
    tags: [ssh, credential]
  # 桌面和文档（可能有导出的凭据、配置备份）
  - path: "%USERPROFILE%\\Desktop"
    tags: [user-files]
  - path: "%USERPROFILE%\\Documents"
    tags: [user-files]
  - path: "%USERPROFILE%\\Downloads"
    tags: [user-files]
  # Shell history（PowerShell PSReadLine）
  - path: "%APPDATA%\\Microsoft\\Windows\\PowerShell\\PSReadLine\\ConsoleHost_history.txt"
    tags: [shell, powershell, history]
  # Docker / IDE user config
  - path: "%APPDATA%\\Docker"
    tags: [docker, config]
  - path: "%LOCALAPPDATA%\\Docker"
    tags: [docker, log]
  - path: "%APPDATA%\\Code\\User\\settings.json"
    tags: [ide, vscode, config]
  - path: "%APPDATA%\\JetBrains"
    tags: [ide, jetbrains, config]
  # 所有用户的 dotfiles
  - path: "C:\\Users\\*\\.*"
    tags: [dotfiles, user]
  - path: "C:\\Users\\*\\.docker"
    tags: [docker, config]
  - path: "C:\\Users\\*\\.gitconfig"
    tags: [git, config]
  - path: "C:\\Users\\*\\.git-credentials"
    tags: [git, credential]
  # 所有用户的 PowerShell history
  - path: "C:\\Users\\*\\AppData\\Roaming\\Microsoft\\Windows\\PowerShell\\PSReadLine\\ConsoleHost_history.txt"
    tags: [shell, powershell, history]
  # IIS Web 应用
  - path: "C:\\inetpub"
    tags: [web, config]
