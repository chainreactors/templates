id: auto-windows
info:
  name: Windows Sensitive Directories
  os: windows

paths:
  # 当前用户所有 dotfiles（.ssh, .aws, .kube, .docker, ...）
  - "%USERPROFILE%\\.*"
  # 桌面和文档（可能有导出的凭据、配置备份）
  - "%USERPROFILE%\\Desktop"
  - "%USERPROFILE%\\Documents"
  - "%USERPROFILE%\\Downloads"
  # 所有用户的 dotfiles
  - "C:\\Users\\*\\.*"
  # IIS Web 应用
  - "C:\\inetpub"
