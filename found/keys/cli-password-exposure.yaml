id: cli-password-exposure

info:
  name: Command-Line Password Exposure
  author: proton
  severity: high
  description: Detects passwords passed directly on the command line via tools like mysql, sshpass, curl, psql, mongosh, redis-cli, etc. Commonly found in shell history files, scripts, and process command lines.
  tags: keys,cli,password,history

file:
  - extensions:
      - all

    extractors:
      - type: regex
        regex:
          # mysql/mariadb: mysql -u root -pSECRET or mysqldump -pSECRET
          - "(?:mysql|mysqldump|mariadb|mysqlimport)\\s[^\\n]*\\s-p(\\S+)"
          # sshpass: sshpass -p PASSWORD ssh ...
          - "sshpass\\s+-p\\s*(\\S+)"
          # psql/pg_dump: PGPASSWORD=xxx psql or PGPASSWORD=xxx pg_dump
          - "PGPASSWORD=(\\S+)"
          # curl/wget with auth: curl -u user:pass or curl --user user:pass
          - "(?:curl|wget)\\s[^\\n]*(?:-u|--user)\\s+\\S+:(\\S+)"
          # curl with bearer/token header
          - "curl\\s[^\\n]*[\"']Authorization:\\s*Bearer\\s+(\\S+)[\"']"
          # redis-cli: redis-cli -a PASSWORD or redis-cli --pass PASSWORD
          - "redis-cli\\s[^\\n]*(?:-a|--pass)\\s+(\\S+)"
          # mongosh/mongo: mongosh --password SECRET
          - "(?:mongosh|mongo)\\s[^\\n]*--password\\s+(\\S+)"
          # htpasswd: htpasswd -b user PASSWORD
          - "htpasswd\\s[^\\n]*-b\\s+\\S+\\s+(\\S+)"
          # openssl: openssl ... -pass pass:SECRET
          - "openssl\\s[^\\n]*-pass\\s+pass:(\\S+)"
          # ansible-vault: ansible-vault ... --vault-password-file or inline
          - "ansible-vault\\s[^\\n]*--vault-pass(?:word)?\\s+(\\S+)"
          # kubectl: kubectl ... --token=xxx
          - "kubectl\\s[^\\n]*--token[=\\s]+(\\S+)"
          # docker login: docker login -p SECRET or --password SECRET
          - "docker\\s+login\\s[^\\n]*(?:-p|--password)\\s+(\\S+)"
