# Glob patterns skipped at walk level.
# Matched case-insensitively against slash-normalized full paths.
# Directory patterns use /** so both the directory itself and its contents are pruned.
# .git is intentionally NOT listed because history may contain leaked credentials.

skip_globs:
  # Windows per-user application data and temp scope
  - "%USERPROFILE%/AppData/**"
  - "%APPDATA%/**"
  - "%LOCALAPPDATA%/**"
  - "%TEMP%/**"
  - "%TMP%/**"
  - "%USERPROFILE%/go/pkg/mod/**"

  # Node / JavaScript package stores and dependency trees
  - "**/node_modules/**"
  - "**/bower_components/**"
  - "**/jspm_packages/**"
  - "**/web_modules/**"
  - "**/npm-cache/**"
  - "**/_cacache/**"
  - "**/.npm/**"
  - "**/.pnpm-store/**"
  - "**/pnpm-store/**"
  - "**/.yarn/cache/**"
  - "**/.yarn/unplugged/**"
  - "**/.yarn/install-state.gz"
  - "**/.bun/install/cache/**"
  - "**/.deno/**"

  # Python environments, bytecode, and package caches
  - "**/__pycache__/**"
  - "**/.venv/**"
  - "**/venv/**"
  - "**/.tox/**"
  - "**/.nox/**"
  - "**/.eggs/**"
  - "**/.mypy_cache/**"
  - "**/.pytest_cache/**"
  - "**/.ruff_cache/**"
  - "**/.hypothesis/**"
  - "**/__pypackages__/**"
  - "**/.pyre/**"
  - "**/.pytype/**"
  - "**/.uv/cache/**"
  - "**/.rye/**"
  - "**/.pdm-build/**"
  - "**/.pdm-python/**"
  - "**/.cache/pip/**"
  - "**/.cache/pypoetry/**"
  - "**/.cache/pdm/**"
  - "**/.cache/uv/**"
  - "**/pip-cache/**"
  - "**/conda/pkgs/**"
  - "**/anaconda3/pkgs/**"
  - "**/miniconda3/pkgs/**"

  # Go module and build caches
  - "**/go/pkg/mod/**"
  - "**/go-build/**"

  # Rust package/build artifacts
  - "**/target/**"
  - "**/.cargo/registry/**"
  - "**/.cargo/git/**"
  - "**/.rustup/toolchains/**"

  # Java / JVM dependency caches and build outputs
  - "**/.gradle/caches/**"
  - "**/.gradle/daemon/**"
  - "**/.gradle/native/**"
  - "**/.gradle/wrapper/dists/**"
  - "**/.m2/repository/**"
  - "**/.ivy2/cache/**"
  - "**/.sdkman/candidates/**"
  - "**/target/**"

  # .NET package cache and build intermediates
  - "**/.nuget/packages/**"
  - "**/obj/**"

  # PHP / Composer dependency and cache directories
  - "**/vendor/**"
  - "**/.composer/cache/**"

  # Ruby gems and bundler caches
  - "**/vendor/bundle/**"
  - "**/.bundle/cache/**"
  - "**/.gem/ruby/**"

  # Elixir / Erlang
  - "**/deps/**"
  - "**/_build/**"
  - "**/.hex/packages/**"
  - "**/.mix/archives/**"

  # Haskell / Stack / Cabal
  - "**/.stack-work/**"
  - "**/.stack/snapshots/**"
  - "**/.cabal/store/**"
  - "**/dist-newstyle/**"

  # OCaml / opam
  - "**/_opam/**"
  - "**/.opam/**"

  # Julia package artifacts
  - "**/.julia/artifacts/**"
  - "**/.julia/compiled/**"
  - "**/.julia/packages/**"

  # Dart / Flutter
  - "**/.pub-cache/**"
  - "**/.dart_tool/**"
  - "**/.dartServer/**"

  # Perl
  - "**/.cpan/build/**"

  # C/C++ and native build package managers
  - "**/.conan/data/**"
  - "**/.conan2/p/**"
  - "**/.conan2/b/**"
  - "**/vcpkg_installed/**"
  - "**/_deps/**"
  - "**/CMakeFiles/**"

  # Swift / Apple package managers
  - "**/.build/**"
  - "**/.swiftpm/**"
  - "**/Carthage/Build/**"
  - "**/Pods/**"

  # Bazel
  - "**/bazel-bin/**"
  - "**/bazel-out/**"
  - "**/bazel-testlogs/**"

  # R package libraries
  - "**/renv/library/**"
  - "**/packrat/lib*/**"

  # VCS metadata other than git
  - "**/.svn/**"
  - "**/.hg/**"

  # IDE / editor indexes
  - "**/.idea/**"
  - "**/.vscode/**"
  - "**/.eclipse/**"
  - "**/.vs/**"

  # IaC and deployment plugin/build outputs
  - "**/.terraform/**"
  - "**/.serverless/**"
